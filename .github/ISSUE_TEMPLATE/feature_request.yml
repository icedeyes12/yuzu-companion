name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Want to suggest something? We'd love to hear it!

  - type: textarea
    id: problem
    attributes:
      label: Problem or Limitation
      description: What problem does this solve?
      placeholder: Describe the issue or limitation...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like it to work?
      placeholder: Describe your proposed solution...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any other approaches you considered?
      placeholder: |

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Screenshots, examples, links to relevant discussions, etc.
      placeholder: |
