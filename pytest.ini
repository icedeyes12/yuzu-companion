[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (may use database)
    e2e: End-to-end tests (full system)
    slow: Slow tests (skip with -m 'not slow')
