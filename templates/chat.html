<!-- FILE: templates/chat.html -->
<!-- DESCRIPTION: Chat interface for AI companion system -->
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat | Yuzu Companion</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- CSS Imports -->
    <link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='css/chat.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='css/sidebar.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='css/theme.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='css/multimodal.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='css/renderer.css') }}">
    
    <!-- Highlight.js CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github-dark.min.css">
</head>
<body>
    <!-- Unified Sidebar -->
    <div class="sidebar" id="mainSidebar">
      <div class="sidebar-header">
        <h2>Yuzu Companion</h2>
        <button class="close-sidebar" onclick="toggleSidebar()">×</button>
      </div>
      
      <div class="sidebar-content">
        <!-- Navigation -->
        <div class="sidebar-section">
          <h3>Navigation</h3>
          <a href="/" class="sidebar-link" onclick="toggleSidebar()">
            <span class="sidebar-icon home-icon"></span> Home
          </a>
          <a href="/chat" class="sidebar-link active" onclick="toggleSidebar()">
            <span class="sidebar-icon chat-icon"></span> Chat
          </a>
          <a href="/config" class="sidebar-link" onclick="toggleSidebar()">
            <span class="sidebar-icon config-icon"></span> Config
          </a>
          <a href="/about" class="sidebar-link" onclick="toggleSidebar()">
            <span class="sidebar-icon about-icon"></span> About
          </a>
        </div>
        
        <!-- Theme Selector -->
        <div class="sidebar-section">
          <h3>Theme</h3>
          <div class="custom-dropdown" id="themeDropdown">
            <div class="dropdown-selected">
              <span class="selected-text">Suisei</span>
              <span class="dropdown-arrow">▼</span>
            </div>
            <div class="dropdown-options">
              <div class="dropdown-option" data-value="suisei">
                <span class="theme-preview suisei-preview"></span>
                Suisei
              </div>
              <div class="dropdown-option" data-value="tokyonight">
                <span class="theme-preview tokyonight-preview"></span>
                Tokyo Night
              </div>
              <div class="dropdown-option" data-value="dark">
                <span class="theme-preview dark-preview"></span>
                Dark Blue
              </div>
              <div class="dropdown-option" data-value="light">
                <span class="theme-preview light-preview"></span>
                Soft Light
              </div>
              <div class="dropdown-option" data-value="lavender">
                <span class="theme-preview lavender-preview"></span>
                Pastel Lavender
              </div>
              <div class="dropdown-option" data-value="mint">
                <span class="theme-preview mint-preview"></span>
                Pastel Mint
              </div>
              <div class="dropdown-option" data-value="peach">
                <span class="theme-preview peach-preview"></span>
                Pastel Peach
              </div>
              <div class="dropdown-option" data-value="dark-lavender">
                <span class="theme-preview dark-lavender-preview"></span>
                Dark Lavender
              </div>
              <div class="dropdown-option" data-value="vanilla-orange">
                <span class="theme-preview vanilla-orange-preview"></span>
                Vanilla Orange
              </div>
            </div>
          </div>
        </div>
        
        <!-- Session Management -->
        <div class="sidebar-section" id="sessionSection">
          <h3>Sessions</h3>
          <button class="sidebar-btn" onclick="createNewSession()">
            <span class="sidebar-icon add-icon"></span> New Chat
          </button>
          <div class="sessions-list" id="sidebarSessionsList">
            <div class="loading">Loading sessions...</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Overlay -->
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

    <!-- MAIN WRAPPER -->
    <div class="chat-app">
        <header class="chat-header header-content">
            <!-- Hamburger Menu - now part of header -->
            <button class="hamburger-menu hamburger" id="hamburgerMenu" onclick="toggleSidebar()">
              <span></span>
              <span></span>
              <span></span>
            </button>
            
            <div class="header-left header-title">
                <h1 class="partner-name">{{ profile.partner_name }}</h1>
                <div class="session-name" id="sessionName"></div>
            </div>
            <div class="affection-display">
                <span class="affection-icon"></span>
                <div class="affection-bar">
                    <div class="affection-fill" style="width: {{ profile.affection }}%;"></div>
                </div>
            </div>
        </header>

        <main class="chat-container" id="chatContainer">
            <!-- messages will appear here -->
        </main>

        <!-- Floating scroll-to-bottom button -->
        <button id="scrollToBottomBtn" class="scroll-to-bottom-btn hidden">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 5v14M19 12l-7 7-7-7"/>
            </svg>
        </button>

        <!-- TYPING INDICATOR -->
        <div id="typingIndicator" class="typing-indicator hidden">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <!-- CLEAN INPUT AREA - WITH MULTIMODAL SUPPORT -->
        <div class="input-area">
            <!-- Multimodal toggle button will be inserted here by JavaScript -->
            <textarea id="messageInput" placeholder="Type your message ..." rows="1"></textarea>
            <button id="sendButton">Send</button>
        </div>
    </div>
    
    <!-- Load marked.js for markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked@18.0.2/lib/marked.umd.js"></script>
    
    <!-- Load Highlight.js (full build with all common languages) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
    
    <!-- Load Mermaid.js for diagrams -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid@11.4.0/dist/mermaid.min.js"></script>
    
    <!-- Load Nested Container Parser -->
    <script src="{{ url_for('static', path='js/nested-parser.js') }}"></script>

    <!-- Our scripts -->
    <script src="{{ url_for('static', path='js/sidebar.js') }}"></script>
    <script src="{{ url_for('static', path='js/renderer.js') }}"></script>
    <script src="{{ url_for('static', path='js/agentic-stream.js') }}"></script>
    <script src="{{ url_for('static', path='js/chat.js') }}"></script>
<!-- HTML Preview Modal -->
<div id="html-preview-modal">
  <div class="html-modal-backdrop" onclick="renderer.closeHtmlModal()"></div>
  <div class="html-modal-content">
    <div class="html-modal-header">
      <span class="html-modal-title" id="preview-modal-title">HTML Preview</span>
      <div class="html-modal-actions">
        <button class="html-modal-btn" onclick="renderer.togglePreviewTheme()" title="Toggle theme" id="theme-toggle-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>
        <button class="html-modal-btn" onclick="renderer.togglePreviewFullscreen()" title="Toggle fullscreen" id="fullscreen-toggle-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 3 21 3 15 9"/><polyline points="9 21 3 15 9 21"/><polyline points="21 3 15 9 9 21"/><polyline points="3 21 9 15 15 21"/></svg>
        </button>
        <button class="html-modal-close" onclick="renderer.closeHtmlModal()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
    </div>
    <div class="html-modal-body" id="preview-body">
      <iframe id="preview-iframe" sandbox="allow-scripts allow-same-origin"></iframe>
      <div id="console-panel" class="console-panel">
        <div class="console-header">
          <span>&#9881; Console</span>
          <button class="console-clear" onclick="window._clearConsole()">Clear</button>
        </div>
        <div id="console-output"></div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
