<!-- FILE: templates/index.html -->
<!-- DESCRIPTION: Home page for AI companion system -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home | Yuzu Companion</title>
  <link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', path='css/sidebar.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', path='css/theme.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', path='css/home.css') }}">
</head>
<body class="home-body">
  {% include 'sidebar.html' %}
  
  <header class="home-header header-content">
    <button class="hamburger-menu hamburger" id="hamburgerMenu" onclick="toggleSidebar()">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <div class="header-title">
      <h1>Welcome, {{ profile.display_name|capitalize }}</h1>
      <p>Partner: {{ profile.partner_name|capitalize }} | Affection: {{ profile.affection }}</p>
    </div>
  </header>

  <div class="menu">
    <a href="/chat" class="card">
      <h2>Chat</h2>
      <p>Talk with your partner</p>
    </a>
    <a href="/config" class="card">
      <h2>Config</h2>
      <p>Adjust settings</p>
    </a>
  </div>

  {% include "partials/footer.html" %}

  <script src="{{ url_for('static', path='js/sidebar.js') }}"></script>
  <script src="{{ url_for('static', path='js/home.js') }}"></script>
</body>
</html>
