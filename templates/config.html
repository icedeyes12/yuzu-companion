{% extends "base.html" %}

{% block title %}Config | Yuzu Companion{% endblock %}

{% block content %}
<h1>Configuration</h1>

<section>
  <h2>Profile Settings</h2>
  <label>
    Your Display Name
    <input type="text" id="display-name" value="{{ profile.display_name }}">
  </label>
  <label>
    Partner Name
    <input type="text" id="partner-name" value="{{ profile.partner_name }}">
  </label>
  <label>
    Affection Level (0-100)
    <input type="range" id="affection-level" min="0" max="100" value="{{ profile.affection }}">
    <output>{{ profile.affection }}</output>
  </label>
  <button id="save-profile">Save Profile</button>
</section>

<section>
  <h2>AI Provider</h2>
  <label>
    Provider
    <select id="ai-provider">
      <option value="">Loading...</option>
    </select>
  </label>
  <label>
    Model
    <select id="ai-model">
      <option value="">Select provider first...</option>
    </select>
  </label>
  <button id="test-provider">Test Connection</button>
  <button id="save-provider">Save Provider</button>
</section>

<script src="{{ url_for('static', filename='js/app.js') }}"></script>
<script>
// Config page logic inline for simplicity
document.addEventListener('DOMContentLoaded', async () => {
  const affectionSlider = document.getElementById('affection-level');
  const affectionOutput = affectionSlider.nextElementSibling;
  
  affectionSlider.addEventListener('input', () => {
    affectionOutput.value = affectionSlider.value;
  });

  document.getElementById('save-profile').addEventListener('click', async () => {
    const response = await fetch('/api/update_profile', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        display_name: document.getElementById('display-name').value,
        partner_name: document.getElementById('partner-name').value,
        affection: parseInt(affectionSlider.value)
      })
    });
    if (response.ok) alert('Profile saved!');
  });

  // Load providers
  try {
    const resp = await fetch('/api/providers/list');
    const data = await resp.json();
    if (data.status === 'success') {
      const providerSelect = document.getElementById('ai-provider');
      providerSelect.innerHTML = data.available_providers.map(p => 
        `<option value="${p}" ${p === data.current_provider ? 'selected' : ''}>${p}</option>`
      ).join('');
      
      updateModelDropdown(data.current_provider, data.all_models, data.current_model);
    }
  } catch (e) {
    console.error('Error loading providers:', e);
  }
});

function updateModelDropdown(provider, allModels, currentModel) {
  const modelSelect = document.getElementById('ai-model');
  const models = allModels[provider] || [];
  modelSelect.innerHTML = models.map(m => 
    `<option value="${m}" ${m === currentModel ? 'selected' : ''}>${m}</option>`
  ).join('');
}
</script>
{% endblock %}
